{% extends "base.html" %}

{% block title %}Changelog — A.R.I.M.A.{% endblock %}

{% block content %}
<div class="max-w-5xl mx-auto">
    <h1 class="text-2xl font-bold mb-4">Changelog</h1>

    <input type="text" placeholder="Search by artist, album, or description..."
           value="{{ search or '' }}"
           name="q"
           hx-get="{{ url_for('changelog.changelog') }}"
           hx-trigger="keyup changed delay:300ms"
           hx-target="#changelog-list"
           hx-swap="innerHTML"
           class="w-full px-3 py-2 border rounded mb-4" style="border-color: var(--border);">

    <div id="changelog-list">
        {% include "fragments/changelog_list.html" %}
    </div>
</div>
{% endblock %}
