{% extends "base.html" %}

{% block title %}A.R.I.M.A. — Changelog{% endblock %}

{% block content %}
<div class="max-w-5xl mx-auto">
    <h1 class="text-2xl font-bold mb-4">Changelog</h1>

    <div class="flex gap-2 mb-4" id="changelog-filters">
        <input type="text" placeholder="Search by artist, album, or description..."
               value="{{ search or '' }}"
               name="q" id="changelog-search"
               hx-get="{{ url_for('changelog.changelog') }}"
               hx-trigger="keyup changed delay:300ms"
               hx-target="#changelog-list"
               hx-swap="innerHTML"
               hx-include="#changelog-filters"
               class="flex-1 px-3 py-2 border rounded" style="border-color: var(--border);">
        <select name="user_id" id="changelog-user-filter"
                hx-get="{{ url_for('changelog.changelog') }}"
                hx-trigger="change"
                hx-target="#changelog-list"
                hx-swap="innerHTML"
                hx-include="#changelog-filters"
                class="px-3 py-2 border rounded" style="border-color: var(--border);">
            <option value="">All users</option>
            {% for u in users %}
            <option value="{{ u.id }}" {% if user_id == u.id|string %}selected{% endif %}>{{ u.username }}</option>
            {% endfor %}
        </select>
        <select name="type" id="changelog-type-filter"
                hx-get="{{ url_for('changelog.changelog') }}"
                hx-trigger="change"
                hx-target="#changelog-list"
                hx-swap="innerHTML"
                hx-include="#changelog-filters"
                class="px-3 py-2 border rounded" style="border-color: var(--border);">
            <option value="">All types</option>
            <option value="Song" {% if change_type == 'Song' %}selected{% endif %}>Song</option>
            <option value="Album" {% if change_type == 'Album' %}selected{% endif %}>Album</option>
            <option value="Artist" {% if change_type == 'Artist' %}selected{% endif %}>Artist</option>
            <option value="Legacy" {% if change_type == 'Legacy' %}selected{% endif %}>Legacy</option>
        </select>
    </div>

    <div id="changelog-list">
        {% include "fragments/changelog_list.html" %}
    </div>
</div>
{% endblock %}
