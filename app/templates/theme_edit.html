{% extends "base.html" %}

{% block title %}Edit Theme — A.R.I.M.A.{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <h1 class="text-2xl font-bold mb-4">Edit: {{ edit_theme.name or "Personal Theme" }}</h1>

    <form method="POST" action="{{ url_for('themes.theme_save', theme_id=edit_theme.id) }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="grid grid-cols-2 gap-3">
            {% for col in colour_cols %}
            <div class="flex items-center gap-2">
                <input type="color" name="{{ col }}" value="{{ colours[col] or '#FFFFFF' }}"
                       class="w-10 h-8 border rounded cursor-pointer" style="border-color: var(--border);">
                <label class="text-xs">{{ col }}</label>
            </div>
            {% endfor %}
        </div>

        <div class="flex gap-3 mt-6">
            <button type="submit" class="px-6 py-2 rounded text-white"
                    style="background-color: var(--button-primary);">Save</button>
            <a href="{{ url_for('themes.themes_list') }}" class="px-6 py-2 rounded"
               style="background-color: var(--button-secondary); color: var(--text-primary);">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
