<!-- Bottom artist navbar — fixed at viewport bottom -->
<div style="position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
            height: 34px; display: flex; flex-wrap: nowrap; align-items: stretch;
            background-color: var(--bg-secondary); border-top: 1px solid var(--border);">
    <!-- Hamburger — fixed, does not scroll -->
    <div style="flex: 0 0 auto; display: flex; align-items: center;">
        <button id="hamburger-btn" onclick="toggleArtistMenu()" type="button" aria-label="Artist menu"
                style="background: none; border: none; cursor: pointer;
                       display: flex; align-items: center; justify-content: center;
                       width: 34px; height: 34px; font-size: 18px; color: var(--text-primary);
                       padding: 0; margin: 0; position: relative; top: -3px; left: 5px;">
            &#9776;
        </button>
        <!-- Hamburger dropdown — opens upward -->
        <div id="artist-menu" class="artist-menu"
             style="display: none;
                    position: fixed; bottom: 34px; left: 0;
                    max-height: 45vh; overflow-y: auto;
                    background-color: var(--bg-secondary);
                    border: 1px solid #000; border-bottom: none;
                    z-index: 30; width: max-content;">
            {% for a in navbar_artists %}
            <a href="{{ url_for('artists.artist_detail', artist_id=a.id) }}"
               {% if navbar_htmx %}
               hx-get="{{ url_for('artists.artist_detail', artist_id=a.id) }}"
               hx-target="#discography"
               hx-swap="innerHTML"
               hx-push-url="false"
               {% endif %}
               onclick="closeArtistMenu()"
               class="artist-menu-item"
               data-artist-id="{{ a.id }}"
               style="display: block; padding: 6px 12px; white-space: nowrap;
                      text-decoration: none; font-size: 13px;
                      border-bottom: 1px solid #000;
                      background-color: var({{ gender_css[a.gender_id] if gender_css else '--text-primary' }});
                      color: var(--artist-button-text);
                      {% if artist and artist.id == a.id %}font-weight: bold;{% endif %}">
                {{ a.name }}
            </a>
            {% endfor %}
        </div>
    </div>
    <!-- Scrollable artist pills -->
    <nav class="artist-nav" style="flex: 1 1 0; display: flex; flex-wrap: nowrap; align-items: center;
                overflow-x: scroll; overflow-y: hidden; gap: 4px; padding: 0 8px;">
        {% for a in navbar_artists %}
        <a href="{{ url_for('artists.artist_detail', artist_id=a.id) }}"
           {% if navbar_htmx %}
           hx-get="{{ url_for('artists.artist_detail', artist_id=a.id) }}"
           hx-target="#discography"
           hx-swap="innerHTML"
           hx-push-url="false"
           {% endif %}
           data-artist-id="{{ a.id }}"
           style="flex: 0 0 auto; white-space: nowrap; padding: 4px 10px; border-radius: 3px;
                  font-size: 13px; text-decoration: none;
                  background-color: var({{ gender_css[a.gender_id] if gender_css else '--text-primary' }}); color: var(--artist-button-text);
                  {% if artist and artist.id == a.id %}font-weight: bold; border-bottom: 2px solid var(--artist-button-text);{% endif %}">
            {{ a.name }}
        </a>
        {% endfor %}
    </nav>
</div>
