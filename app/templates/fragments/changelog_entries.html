{% for e in entries %}
<tr class="border border-grid-line" style="{% if loop.index0 % 2 == 1 %}background-color: var(--row-alternate);{% endif %}">
    <td class="px-3 py-2 text-xs border border-grid-line">
        <div class="flex items-center justify-center gap-1.5 whitespace-nowrap px-1">
            <img src="{{ e.user.profile_image or url_for('static', filename='img/default_image.png') }}"
                 alt="" referrerpolicy="no-referrer"
                 onerror="this.onerror=null;this.src='{{ url_for('static', filename='img/default_image.png') }}'"
                 class="w-8 h-8 rounded-full object-cover flex-shrink-0">
            <span>{{ e.user.username if e.user else 'Unknown' }}</span>
        </div>
    </td>
    <td class="px-3 py-2 text-xs border border-grid-line">
        {{ e.change_type.type if e.change_type else '—' }}
    </td>
    <td class="px-3 py-2 border border-grid-line">{{ e._linked_desc }}</td>
    <td class="px-3 py-2 text-xs whitespace-nowrap changelog-date border border-grid-line font-mono" data-utc="{{ e.date or '' }}">
        {{ e.date[:10] if e.date else '-' }}
    </td>
    {% if session.get('edit_mode') and current_user.is_admin %}
    <td class="px-3 py-2 text-center border border-grid-line">
        <button hx-delete="/changelog/{{ e.id }}"
                hx-target="closest tr"
                hx-swap="outerHTML"
                hx-confirm="Delete this changelog entry?"
                class="bg-transparent border-0 text-delete cursor-pointer text-inherit"
                title="Delete entry">&times;</button>
    </td>
    {% endif %}
</tr>
{% endfor %}
<div id="changelog-load-more" hx-swap-oob="true" class="text-center py-4 mt-4"
    {% if has_more %}
    <button hx-get="{{ url_for('changelog.changelog', before=last_id) }}"
            hx-target="#changelog-tbody"
            hx-swap="beforeend"
            hx-include="#changelog-filters"
            class="px-4 py-2 text-sm rounded border cursor-pointer border-border bg-secondary-bg text-primary-text">
        Load More
    </button>
    {% endif %}
</div>
