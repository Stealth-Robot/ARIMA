<form hx-post="{{ url_for('rules.rules_save') }}"
      hx-target="#rules-content"
      hx-swap="innerHTML">
    <p class="text-xs mb-2" style="color: var(--text-secondary);">
        Markdown supported:
        <code>## Heading</code> &nbsp;
        <code>**bold**</code> &nbsp;
        <code>*italic*</code> &nbsp;
        <code>- bullet list</code> &nbsp;
        <code>1. numbered list</code> &nbsp;
        <code>[link text](url)</code> &nbsp;
        <code>`inline code`</code> &nbsp;
        <code>&gt; blockquote</code> &nbsp;
        <code>---</code> (horizontal rule)
    </p>
    <textarea name="content" rows="20"
              class="w-full px-3 py-2 border rounded text-sm font-mono"
              style="border-color: var(--border);">{{ rule.content if rule else '' }}</textarea>
    <div class="flex gap-3 mt-3">
        <button type="submit"
                class="px-4 py-2 rounded text-sm text-white"
                style="background-color: var(--button-primary);">
            Save
        </button>
        <button type="button"
                hx-get="{{ url_for('rules.rules_display') }}"
                hx-target="#rules-content"
                hx-swap="innerHTML"
                class="px-4 py-2 rounded text-sm"
                style="background-color: var(--button-secondary); color: var(--text-primary);">
            Cancel
        </button>
    </div>
</form>
