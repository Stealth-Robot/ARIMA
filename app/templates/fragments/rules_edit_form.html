<form hx-post="{{ url_for('rules.rules_save') }}"
      hx-target="#rules-content"
      hx-swap="innerHTML">
    <textarea name="content" rows="20"
              class="w-full px-3 py-2 border rounded text-sm font-mono"
              style="border-color: var(--border);">{{ rule.content if rule else '' }}</textarea>
    <button type="submit"
            class="mt-3 px-4 py-2 rounded text-sm text-white"
            style="background-color: var(--button-primary);">
        Save
    </button>
</form>
