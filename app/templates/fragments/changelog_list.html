{% if not entries %}
<p style="color: var(--text-secondary);">No changelog entries found.</p>
{% else %}
<table class="w-full text-sm border-collapse" style="border: 1px solid var(--grid-line);">
    <thead>
        <tr style="background-color: var(--header-row);">
            <th class="text-left px-3 py-2" style="border: 1px solid var(--grid-line);">Name</th>
            <th class="text-left px-3 py-2" style="border: 1px solid var(--grid-line);">Desc</th>
            <th class="text-left px-3 py-2" style="border: 1px solid var(--grid-line);">Date</th>
        </tr>
    </thead>
    <tbody>
        {% for e in entries %}
        <tr style="border: 1px solid var(--grid-line);
                   {% if loop.index0 % 2 == 1 %}background-color: var(--row-alternate);{% endif %}">
            <td class="px-3 py-2 text-xs" style="border: 1px solid var(--grid-line);">
                {{ e.user.username if e.user else 'Unknown' }}
            </td>
            <td class="px-3 py-2" style="border: 1px solid var(--grid-line);">{{ e.description }}</td>
            <td class="px-3 py-2 text-xs whitespace-nowrap" style="border: 1px solid var(--grid-line);">
                {{ e.date[:10] if e.date else '-' }}
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endif %}
