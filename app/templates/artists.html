{% extends "base.html" %}

{% block title %}Artists — A.R.I.M.A.{% endblock %}

{% block content %}
<!-- Discography area -->
<div id="discography" class="mb-4">
    {% if artist %}
    {% include "fragments/artist_discography.html" %}
    {% else %}
    <p class="text-center mt-8" style="color: var(--text-secondary);">Select an artist below.</p>
    {% endif %}
</div>

<!-- Bottom artist navbar -->
<nav class="fixed bottom-0 left-0 right-0 overflow-x-auto overflow-y-hidden whitespace-nowrap px-4 py-1 border-t"
     style="background-color: var(--bg-secondary); border-color: var(--border); height: 36px;">
    {% for a in navbar_artists %}
    <a href="{{ url_for('artists.artist_detail', artist_id=a.id) }}"
       hx-get="{{ url_for('artists.artist_detail', artist_id=a.id) }}"
       hx-target="#discography"
       hx-swap="innerHTML"
       class="inline-block px-3 py-1 mr-1 rounded text-xs hover:opacity-80
              {% if artist and artist.id == a.id %}font-bold border-b-2 border-white{% endif %}"
       style="background-color: var({{ gender_css[a.gender_id] if gender_css else '--text-primary' }}); color: white;">
        {{ a.name }}
    </a>
    {% endfor %}
</nav>
{% endblock %}
