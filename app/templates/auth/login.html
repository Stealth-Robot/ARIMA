<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A.R.I.M.A.</title>
    <link rel="icon" type="image/jpeg" href="{{ url_for('static', filename='img/tab_image.jpg') }}">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen flex items-start justify-center">
    <div class="mt-24 w-full max-w-md px-6">
        <!-- Header image -->
        <div class="flex justify-center mb-6">
            <div class="w-32 h-32 bg-gray-300 rounded-full flex items-center justify-center text-gray-500 text-sm">
                Logo
            </div>
        </div>

        <!-- Title -->
        <h1 class="text-3xl font-bold text-center text-gray-900 mb-2">A.R.I.M.A.</h1>

        <!-- Mission statement -->
        <p class="text-center text-gray-600 mb-2">App for Rating and Indexing Music Albums</p>

        <!-- Horizontal line -->
        <hr class="border-gray-300 mb-4">

        <!-- Description -->
        <p class="text-center text-gray-500 text-sm mb-8">
            A lightweight app for friends to rate and compare music.
        </p>

        <!-- Error message -->
        {% if error %}
        <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-2 rounded mb-4 text-sm text-center">
            {{ error }}
        </div>
        {% endif %}

        <!-- Success message -->
        {% if success %}
        <div class="bg-green-100 border border-green-400 text-green-700 px-4 py-2 rounded mb-4 text-sm text-center">
            {{ success }}
        </div>
        {% endif %}

        <!-- Login Form -->
        <form id="login-form" method="POST" action="{{ url_for('auth.login') }}" class="{% if mode == 'create' %}hidden{% endif %}">
            <div class="mb-4">
                <input type="text" name="username" placeholder="Username"
                       class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
                       required>
            </div>
            <div class="mb-6">
                <input type="password" name="password" placeholder="Password"
                       class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
                       required>
            </div>
            <button type="submit"
                    class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 mb-3">
                Login
            </button>
        </form>

        <!-- Create Account Form -->
        <form id="create-form" method="POST" action="{{ url_for('auth.create_account') }}" class="{% if mode != 'create' %}hidden{% endif %}">
            <div class="mb-4">
                <input type="email" name="email" id="create-email" placeholder="Email"
                       value="{{ create_email or '' }}"
                       class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
                       required>
            </div>
            <div class="mb-4">
                <input type="text" name="username" id="create-username" placeholder="Username"
                       value="{{ create_username or '' }}"
                       class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
                       required>
            </div>
            <div class="mb-4">
                <input type="password" name="password" placeholder="Create Password"
                       class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
                       required>
            </div>
            <div class="mb-6">
                <input type="password" name="confirm_password" placeholder="Confirm Password"
                       class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
                       required>
            </div>
            <button type="submit" id="create-submit"
                    class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 mb-3 disabled:opacity-50 disabled:cursor-not-allowed"
                    disabled>
                Create Account
            </button>
        </form>

        <!-- Action buttons -->
        <div class="flex gap-3">
            <form method="POST" action="{{ url_for('auth.guest_login') }}" class="flex-1">
                <button type="submit"
                        class="w-full bg-gray-200 text-gray-700 py-2 rounded hover:bg-gray-300">
                    Login as Guest
                </button>
            </form>
            <button id="toggle-create" type="button"
                    class="flex-1 bg-gray-200 text-gray-700 py-2 rounded hover:bg-gray-300">
                {% if mode == 'create' %}Back to Login{% else %}Create Account{% endif %}
            </button>
        </div>
    </div>

    <script>
        // Show error/success as alert on page load
        {% if error %}
        alert('{{ error }}');
        {% endif %}
        {% if success %}
        alert('{{ success }}');
        {% endif %}

        const loginForm = document.getElementById('login-form');
        const createForm = document.getElementById('create-form');
        const toggleBtn = document.getElementById('toggle-create');
        const createUsername = document.getElementById('create-username');
        const createSubmit = document.getElementById('create-submit');

        // Toggle between login and create account forms
        toggleBtn.addEventListener('click', () => {
            const showingCreate = !createForm.classList.contains('hidden');
            if (showingCreate) {
                createForm.classList.add('hidden');
                loginForm.classList.remove('hidden');
                toggleBtn.textContent = 'Create Account';
            } else {
                loginForm.classList.add('hidden');
                createForm.classList.remove('hidden');
                toggleBtn.textContent = 'Back to Login';
            }
        });

        // Enable submit button once user interacts with username field
        let usernameInteracted = false;
        createUsername.addEventListener('input', () => {
            usernameInteracted = true;
            createSubmit.disabled = createUsername.value.trim() === '';
        });
        createUsername.addEventListener('focus', () => {
            if (!usernameInteracted && createUsername.value.trim() !== '') {
                // Pre-populated but not yet interacted — keep disabled
                createSubmit.disabled = true;
            }
        });

        // If returning to create mode with pre-populated data, keep submit disabled
        // until user interacts with username
        {% if mode == 'create' and create_username %}
        createSubmit.disabled = true;
        {% endif %}
    </script>
</body>
</html>
