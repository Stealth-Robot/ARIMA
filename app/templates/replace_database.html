{% extends "base.html" %}
{% block title %}Replace Database — A.R.I.M.A.{% endblock %}
{% block content %}
<div style="max-width: 480px;" class="mx-auto mt-16 p-6">
    <h1 class="text-xl font-bold mb-4 text-primary-text">Replace Database</h1>
    <p class="text-sm mb-6 text-secondary-text">
        Upload a SQLite <code>.db</code> file to replace the current production database.
        A backup of the current database will be saved automatically.
    </p>
    <form method="POST" enctype="multipart/form-data">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label class="block text-sm mb-1 text-primary-text">Database file (.db)</label>
        <input type="file" name="database" accept=".db" required
               class="w-full mb-4 text-sm text-primary-text">
        <input type="text" value="{{ current_user.username }}" autocomplete="username" style="position:absolute;opacity:0;height:0;width:0;pointer-events:none;" tabindex="-1" aria-hidden="true">
        <label class="block text-sm mb-1 text-primary-text">Password</label>
        <input type="password" name="password" required autocomplete="current-password"
               class="w-full px-3 py-2 border rounded mb-4 border-border text-primary-text bg-primary-bg">
        <button type="submit" class="px-4 py-2 rounded text-sm text-white bg-delete">
            Replace Database
        </button>
    </form>
</div>
{% endblock %}
