{% extends "base.html" %}
{% block title %}Replace Database — A.R.I.M.A.{% endblock %}
{% block content %}
<div style="max-width: 480px; margin: 60px auto; padding: 24px;">
    <h1 class="text-xl font-bold mb-4" style="color: var(--text-primary);">Replace Database</h1>
    <p class="text-sm mb-6" style="color: var(--text-secondary);">
        Upload a SQLite <code>.db</code> file to replace the current production database.
        A backup of the current database will be saved automatically.
    </p>
    <form method="POST" enctype="multipart/form-data">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label class="block text-sm mb-1" style="color: var(--text-primary);">Database file (.db)</label>
        <input type="file" name="database" accept=".db" required
               class="w-full mb-4 text-sm" style="color: var(--text-primary);">
        <input type="text" value="{{ current_user.username }}" autocomplete="username" style="position:absolute;opacity:0;height:0;width:0;pointer-events:none;" tabindex="-1" aria-hidden="true">
        <label class="block text-sm mb-1" style="color: var(--text-primary);">Password</label>
        <input type="password" name="password" required autocomplete="current-password"
               class="w-full px-3 py-2 border rounded mb-4" style="border-color: var(--border); color: var(--text-primary); background: var(--bg-primary);">
        <button type="submit" class="px-4 py-2 rounded text-sm text-white"
                style="background-color: var(--delete-button);">
            Replace Database
        </button>
    </form>
    <a href="{{ url_for('admin.download_database') }}"
       class="inline-block mt-4 px-4 py-2 rounded text-sm text-white"
       style="background-color: var(--link, #2563EB); text-decoration: none;">
        Download Database
    </a>
</div>
{% endblock %}
